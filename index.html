<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Gecko Films</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* AQUÍ ESTÁ EL CAMBIO: Usamos tu imagen de fondo */
            background: url('fondo.jpg') no-repeat center center fixed;
            background-size: cover; 
            color: #f8f8f6;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Capa oscura para que el texto resalte sobre la textura */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Sombra suave */
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2; /* Por encima de la sombra */
            width: 90%;
            max-width: 650px;
        }

        h1 {
            font-size: clamp(45px, 10vw, 80px);
            font-weight: 800;
            margin: 0;
            letter-spacing: -2px;
            text-transform: uppercase;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 300;
            margin-top: 10px;
            border-top: 1px solid rgba(248, 248, 246, 0.5);
            padding-top: 10px;
        }

        .contact {
            margin-top: 100px;
        }

        .contact h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .contact a, .contact span {
            display: block;
            color: #f8f8f6;
            text-decoration: none;
            font-size: 15px;
            margin: 5px 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h1>COMING SOON</h1>
        <div class="subtitle">
            <span>Gecko Films</span>
            <span>Creative Studio</span>
        </div>
        <div class="contact">
            <h2>Contact</h2>
            <a href="mailto:info@geckofilms.es">info@geckofilms.es</a>
            <span>658147370</span>
        </div>
    </div>
</body>
</html>
